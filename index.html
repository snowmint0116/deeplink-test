<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deeplink Tester</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #00ff88;
      --accent-dim: rgba(0, 255, 136, 0.12);
      --text: #f0f0f0;
      --text-muted: #666;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans KR', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 36px;
      line-height: 1.6;
      font-weight: 300;
    }

    .input-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
    }

    .input-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      display: block;
    }

    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      caret-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active {
      opacity: 0.85;
      transform: scale(0.99);
    }

    .result {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      display: none;
    }

    .result.success {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      display: block;
    }

    .result.error {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.4);
      color: #ff6b6b;
      display: block;
    }

    .history {
      margin-top: 32px;
    }

    .history-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      padding: 0;
      width: auto;
      margin: 0;
      letter-spacing: 0.05em;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    .history-item:active {
      border-color: var(--accent);
      color: var(--text);
    }

    .empty {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">// deeplink tester</div>
    <h1>Deeplink Tester</h1>
    <p class="desc">딥링크 주소를 입력하고 버튼을 탭하세요.<br>최근 사용한 주소는 아래에 저장됩니다.</p>

    <div class="input-wrap">
      <span class="input-label">DEEPLINK URL</span>
      <input type="text" id="urlInput" placeholder="myapp://path/to/screen" autocomplete="off" autocapitalize="off">
    </div>

    <button onclick="launch()">실행하기</button>

    <div class="result" id="result"></div>

    <div class="history" id="historySection" style="display:none">
      <div class="history-label">
        <span>RECENT</span>
        <button class="clear-btn" onclick="clearHistory()">CLEAR</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'deeplink_history';

    function getHistory() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      } catch { return []; }
    }

    function saveHistory(url) {
      let history = getHistory().filter(h => h !== url);
      history.unshift(url);
      history = history.slice(0, 5);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      renderHistory();
    }

    function clearHistory() {
      localStorage.removeItem(STORAGE_KEY);
      renderHistory();
    }

    function renderHistory() {
      const history = getHistory();
      const section = document.getElementById('historySection');
      const list = document.getElementById('historyList');

      if (history.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      list.innerHTML = history.map(url => `
        <div class="history-item" onclick="setUrl('${url.replace(/'/g, "\\'")}')">${url}</div>
      `).join('');
    }

    function setUrl(url) {
      const input = document.getElementById('urlInput');
      input.value = '';
      input.value = url;
      document.getElementById('result').className = 'result';
    }

    function showResult(type, msg) {
      const el = document.getElementById('result');
      el.className = 'result ' + type;
      el.textContent = msg;
    }

    function launch() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        showResult('error', '// URL을 입력해주세요');
        return;
      }
      saveHistory(url);
      showResult('success', '// 딥링크 실행 중...');
      window.location.href = url;
    }

    document.getElementById('urlInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') launch();
    });

    renderHistory();
  </script>
</body>
</html>
